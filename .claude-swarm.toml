# Medieval RTS — swarm config
# Paths relative to git root (this dir).

spec_dir           = "./"
briefs_dir         = "briefs/"
type_contract_path = "sim/contract.py"

umbrella_test_cmd  = "python -m pytest tests/test_umbrella.py -x -q"
graphify_cmd       = ""

parent_owned = [
  # Python sim (wave done; out of scope for Godot wave)
  "sim/**",
  "tests/**",
  "_balance/**",
  "SPEC.md",
  ".claude-swarm.toml",
  "briefs/**",
  "GODOT_PORT_PROGRESS.md",
  # Godot port shared planning artifacts
  "SPEC_GODOT.md",
  "briefs_godot/**",
  # Godot project shell (parent-owned wave-1 scaffolding)
  "godot/project.godot",
  "godot/icon.svg",
  "godot/icon.png",
  "godot/scenes/**",
  "godot/scripts/**",
  "godot/addons/**",
  "godot/tests/test_umbrella.gd",
  "godot/tests/fixtures/**",
  # Misc Godot tooling
  "godot/export_presets.cfg",
  # Out-of-scope assets
  "app/**",
  "assets/**",
]

[invariants]
max_impl_lines      = 220
max_test_assertions = 25

ambiguous_verbs = [
  "decide", "choose", "design", "determine",
  "figure out", "resolve", "as appropriate",
  "use your judgment", "pick", "select an approach",
]

[gates]
extra_spec_gate_cmds = [
  "grep -q '^## 14. Type contract' \"$SPEC_FILE\"",
  "grep -q '^## 15. Umbrella acceptance test' \"$SPEC_FILE\"",
  "grep -Eq 'AC-[0-9]+' \"$SPEC_FILE\"",
]
