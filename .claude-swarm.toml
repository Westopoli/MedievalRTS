# Medieval RTS — swarm config
# Paths relative to git root (this dir).

spec_dir           = "./"
briefs_dir         = "briefs/"
type_contract_path = "sim/contract.py"

umbrella_test_cmd  = "python -m pytest tests/test_umbrella.py -x -q"
graphify_cmd       = ""

parent_owned = [
  "sim/contract.py",
  "sim/__init__.py",
  "tests/test_umbrella.py",
  "tests/conftest.py",
  "SPEC.md",
  ".claude-swarm.toml",
  "briefs/**",
  "app/**",
  "assets/**",
  "*.tscn",
  "*.gd",
  "project.godot",
]

[invariants]
max_impl_lines      = 220
max_test_assertions = 25

ambiguous_verbs = [
  "decide", "choose", "design", "determine",
  "figure out", "resolve", "as appropriate",
  "use your judgment", "pick", "select an approach",
]

[gates]
extra_spec_gate_cmds = [
  "grep -q '^## 14. Type contract' \"$SPEC_FILE\"",
  "grep -q '^## 15. Umbrella acceptance test' \"$SPEC_FILE\"",
  "grep -Eq 'AC-[0-9]+' \"$SPEC_FILE\"",
]
